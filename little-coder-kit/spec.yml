schemaVersion: "1"
kind: agent
name: little-coder
displayName: little-coder
description: >
  A Claude Code-inspired CLI coding agent that talks to a local
  llama-server instance on the host via an OpenAI-compatible API.

network:
  allowedDomains:
    - "host.docker.internal:8080"
    - "github.com:443"
    - "*.github.com:443"
    - "objects.githubusercontent.com:443"

environment:
  variables:
    LLAMACPP_BASE_URL: "http://host.docker.internal:8080/v1"
    LLAMACPP_API_KEY: "noop"
    LITTLE_CODER_PERMISSION_MODE: "accept-all"

agent:
  image: "docker.io/jmmartin397/little-coder-template:latest"
  aiFilename: AGENTS.md
  persistence: persistent
  entrypoint:
    run: ["little-coder", "--model", "llamacpp/qwen3.6-27b"]

commands:
  initFiles:
    - path: /home/agent/.config/little-coder/models.json
      content: |
        {
          "providers": {
            "llamacpp": {
              "api": "openai-completions",
              "apiKey": "LLAMACPP_API_KEY",
              "models": [
                {
                  "id": "qwen3.6-27b",
                  "name": "Qwen3.6-27B (local llama.cpp, 220K)",
                  "reasoning": true,
                  "input": ["text"],
                  "contextWindow": 220000,
                  "maxTokens": 32768,
                  "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 }
                }
              ]
            }
          }
        }
      onlyIfMissing: false